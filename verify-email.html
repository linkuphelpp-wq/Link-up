<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد البريد الإلكتروني – LinkUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #f0f7ff 0%, #e8f0fe 40%, #d9e9fa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }
        /* دوائر خلفية ناعمة */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
        }
        .bg-circle1 { width: 300px; height: 300px; background: #c7d2fe; top: -50px; left: -80px; }
        .bg-circle2 { width: 250px; height: 250px; background: #a5f3fc; bottom: -60px; right: -70px; }
        .bg-circle3 { width: 200px; height: 200px; background: #fde68a; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.3; }

        .card {
            position: relative;
            z-index: 10;
            max-width: 480px;
            width: 100%;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 3rem;
            padding: 3rem 2rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.08), 0 10px 20px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.8);
            text-align: center;
            transition: transform 0.3s;
        }

        .mail-icon {
            margin: 0 auto 1.5rem;
            width: 90px;
            height: 90px;
            background: linear-gradient(145deg, #4F46E5, #7C3AED);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 35px -10px rgba(79,70,229,0.4);
        }
        .mail-icon svg {
            width: 46px;
            height: 46px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 800;
            color: #1e1b4b;
            margin-bottom: 0.6rem;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #475569;
            margin-bottom: 2rem;
            font-size: 1rem;
            line-height: 1.7;
        }

        /* صناديق الحالة */
        .status-box {
            padding: 1.5rem;
            border-radius: 1.5rem;
            margin: 1rem 0;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            transition: all 0.3s ease;
        }
        .status-box.active { display: flex; }

        .spinner {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 4px solid rgba(79,70,229,0.15);
            border-top-color: #4F46E5;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-box { background: #fef9c3; color: #854d0e; }
        .success-box { background: #d1fae5; color: #065f46; }
        .error-box { background: #fee2e2; color: #991b1b; }

        .status-icon svg {
            width: 44px; height: 44px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.85rem 2.2rem;
            border-radius: 1.2rem;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            color: #fff;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.25s;
            box-shadow: 0 10px 25px -8px rgba(79,70,229,0.4);
            margin-top: 0.5rem;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -8px rgba(79,70,229,0.55);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #4F46E5;
            color: #4F46E5;
            box-shadow: none;
        }
        .btn-outline:hover {
            background: #4F46E5;
            color: white;
        }
        .btn-error {
            background: #dc2626;
            box-shadow: 0 10px 20px -8px rgba(220,38,38,0.4);
        }
        .btn-error:hover {
            box-shadow: 0 12px 25px -8px rgba(220,38,38,0.55);
        }

        .mt-2 { margin-top: 0.75rem; }
    </style>
</head>
<body>
    <div class="bg-circle bg-circle1"></div>
    <div class="bg-circle bg-circle2"></div>
    <div class="bg-circle bg-circle3"></div>

    <div class="card">
        <!-- أيقونة البريد -->
        <div class="mail-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2" />
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </svg>
        </div>

        <h1>تأكيد البريد الإلكتروني</h1>
        <p class="subtitle">انقر على الرابط الذي أرسلناه إلى بريدك الإلكتروني،<br>أو انتظر حتى نتحقق منه تلقائياً.</p>

        <!-- تحميل -->
        <div id="loadingBox" class="status-box loading-box active">
            <div class="spinner"></div>
            <span>جارٍ التحقق من بريدك الإلكتروني...</span>
        </div>

        <!-- نجاح -->
        <div id="successBox" class="status-box success-box">
            <div class="status-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
            </div>
            <span style="font-weight:700; font-size:1.2rem;">تم تأكيد البريد بنجاح!</span>
            <span>أهلاً بك في مجتمع LinkUp.</span>
            <a href="https://your-app-url.com" class="btn mt-2">
                فتح التطبيق
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </a>
        </div>

        <!-- خطأ -->
        <div id="errorBox" class="status-box error-box">
            <div class="status-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
            </div>
            <span style="font-weight:700; font-size:1.2rem;">تعذّر التحقق</span>
            <span id="errorMessage" style="text-align:center;"></span>
            <button onclick="location.reload()" class="btn btn-error mt-2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                إعادة المحاولة
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAJcSl5mKrjJYH9pHKJQVHfufrfk0KcCHg",
            authDomain: "tero-2792b.firebaseapp.com",
            projectId: "tero-2792b",
            storageBucket: "tero-2792b.firebasestorage.app",
            messagingSenderId: "307482241190",
            appId: "1:307482241190:web:5a0439c9a1bdd0574b6c67"
        };
        firebase.initializeApp(firebaseConfig);

        const urlParams = new URLSearchParams(window.location.search);
        const oobCode = urlParams.get('oobCode');
        const mode = urlParams.get('mode');

        const loadingBox = document.getElementById('loadingBox');
        const successBox = document.getElementById('successBox');
        const errorBox = document.getElementById('errorBox');
        const errorMessage = document.getElementById('errorMessage');

        if (!oobCode || mode !== 'verifyEmail') {
            loadingBox.classList.remove('active');
            errorBox.classList.add('active');
            errorMessage.textContent = 'رابط التحقق غير صالح أو منتهي الصلاحية.';
        } else {
            firebase.auth().applyActionCode(oobCode)
                .then(() => {
                    loadingBox.classList.remove('active');
                    successBox.classList.add('active');
                })
                .catch((error) => {
                    loadingBox.classList.remove('active');
                    errorBox.classList.add('active');
                    if (error.code === 'auth/invalid-action-code' || error.code === 'auth/expired-action-code') {
                        errorMessage.textContent = 'انتهت صلاحية رابط التحقق. اطلب رابطاً جديداً من التطبيق.';
                    } else {
                        errorMessage.textContent = error.message;
                    }
                });
        }
    </script>
</body>
</html>
